# Render Blueprint — deploys the Golf Scoreboard as one free web service.
#
# In Render: New → Blueprint → connect this repo. Render reads everything below,
# so the only thing you enter by hand is the two secret values
# (DATABASE_URL and ADMIN_PASSWORD), which Render will prompt you for.
services:
  - type: web
    name: golf-scoreboard
    runtime: node
    plan: free
    branch: main
    autoDeploy: true # redeploy automatically on every push to main
    # Build the frontend + API, then create/update the database tables in Neon.
    # pnpm 10 matches the lockfile and installs everything. Its only failure is
    # the cosmetic "esbuild build script ignored" gate, which "|| true" survives —
    # esbuild still works via its @esbuild/linux-x64 package. Typecheck runs as a
    # hard gate (a failing type error fails the build, leaving the live site up),
    # then build the two served packages, run idempotent column migrations, and
    # best-effort drizzle push for fresh-DB table creation (push stalls on
    # interactive prompts in CI, so it can't be trusted for column changes — hence
    # the explicit migrate step; "|| true" keeps its flakiness from failing builds).
    buildCommand: npm install -g pnpm@10 && (pnpm install || true) && (pnpm rebuild esbuild || true) && pnpm typecheck && BASE_PATH=/ PORT=8080 pnpm --filter @workspace/golf-pool --filter @workspace/api-server run build && pnpm --filter @workspace/db migrate && (pnpm --filter @workspace/db push-force || true)
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
      # Secrets — Render prompts for these when you apply the blueprint.
      - key: DATABASE_URL # your Neon direct (non-pooled) connection string
        sync: false
      - key: ADMIN_PASSWORD # a password you choose; required to manage tournaments
        sync: false
